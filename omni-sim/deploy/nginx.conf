# Nginx configuration for Omni-Sim Web Console
# Serves the static web console on port 3000 and proxies WebSocket to port 9001.

server {
    listen 3000;
    server_name _;

    root /var/www/html;
    index index.html;

    # Serve static web console
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket telemetry connections
    location /ws {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
