version: '3.8'

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?数据库密码必须设置}
      POSTGRES_DB: ${POSTGRES_DB:-skillquest}
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-skillquest}']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Redis (排行榜 + 缓存 + WebSocket pub/sub) ─────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── NestJS API ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-skillquest}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-skillquest}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT密钥必须设置}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Next.js Web ────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Python AI Engine ──────────────────────────────────
  ai-engine:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ai
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ALLOWED_ORIGINS=http://api:3001
      - AI_ENGINE_HOST=0.0.0.0
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    # 不对外暴露端口，仅通过 nginx 内网访问

  # ─── Nginx 反向代理 ────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
      ai-engine:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
