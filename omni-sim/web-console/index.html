<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni-Sim Web Console</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Omni-Sim <span class="subtitle">Web Console</span></h1>
    </div>
    <div class="header-right">
      <span id="conn-status" class="conn-disconnected">⚪ Disconnected</span>
      <button id="btn-reconnect" class="btn">Reconnect</button>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <a href="#/" class="nav-link nav-active">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Dashboard</span>
      </a>
      <a href="#/simulation" class="nav-link">
        <span class="nav-icon">⚙️</span>
        <span class="nav-text">Simulation</span>
      </a>
      <a href="#/alerts" class="nav-link">
        <span class="nav-icon">🔔</span>
        <span class="nav-text">Alerts</span>
      </a>
      <a href="#/packs" class="nav-link">
        <span class="nav-icon">📦</span>
        <span class="nav-text">OPDL Packs</span>
      </a>
      <a href="#/settings" class="nav-link">
        <span class="nav-icon">🛠</span>
        <span class="nav-text">Settings</span>
      </a>
      <a href="#/about" class="nav-link">
        <span class="nav-icon">ℹ️</span>
        <span class="nav-text">About</span>
      </a>
    </nav>

    <!-- Main Content Area -->
    <main id="app-content">
      <!-- Pages are rendered here by the router -->
    </main>
  </div>

  <footer>
    <p>Omni-Sim Platform © 2026 — Telemetry via <code>ws://127.0.0.1:9001</code></p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
